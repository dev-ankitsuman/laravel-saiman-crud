name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to file a bug report!

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: laravel
    attributes:
      label: Laravel Version
      placeholder: "e.g. 11.x"
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.3"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command Used
      placeholder: "php artisan make:crud Product --fields=..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Stack Trace / Error Output
      render: shell